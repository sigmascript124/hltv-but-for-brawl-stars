<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль игрока - AngerBoy</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }
        .profile-container {
            max-width: 600px;
            margin: 30px auto;
            background-color: #161b22;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-align: center;
            border: 1px solid #30363d;
        }
        .back-btn {
            display: inline-block;
            color: #58a6ff;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .back-btn:hover { text-decoration: underline; }
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #58a6ff;
            object-fit: cover;
            background-color: #0d1117;
        }
        h1 { color: #fff; margin: 10px 0 5px 0; font-size: 28px; }
        .team-tag { color: #ff9f0a; font-weight: bold; font-size: 16px; margin-bottom: 20px; }
        
        /* Статистика как на HLTV */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }
        .stat-card {
            background-color: #21262d;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #30363d;
        }
        .stat-value { font-size: 22px; font-weight: bold; color: #58a6ff; }
        .stat-label { font-size: 12px; color: #8b949e; text-transform: uppercase; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="profile-container">
        <a href="index.html" class="back-btn">← Вернуться к топу команд</a>
        
        <img src="angelboy.png" class="profile-avatar" alt="AngerBoy">
        
        <h1>AngerBoy</h1>
        <div class="team-tag">FUT Esports</div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value">107k+</div>
                <div class="stat-label">Трофеи</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">Morte / Ивент</div>
                <div class="stat-label">mina</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">1.25</div>
                <div class="stat-label">Рейтинг формы</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">ukraine</div>
                <div class="stat-label">Регион</div>
            </div>
        </div>
    </div>

</body>
</html>
