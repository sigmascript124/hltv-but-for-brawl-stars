<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- ЭТА СТРОЧКА ВКЛЮЧАЕТ АДАПТИВНОСТЬ ПОД СМАРТФОНЫ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars Киберспорт Хаб</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 10px;
            padding-bottom: 60px; /* Отступ снизу для плашки версии */
        }

        /* Версия сайта в углу экрана */
        .site-version {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background-color: #21262d;
            color: #8b949e;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 11px;
            border: 1px solid #30363d;
            font-family: monospace;
            z-index: 9999;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        h1 {
            color: #58a6ff;
            text-align: center;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 15px;
        }

        p.subtitle {
            text-align: center;
            color: #8b949e;
            margin-top: -10px;
            font-size: 14px;
            padding: 0 10px;
        }

        /* Контейнер для адаптивной прокрутки таблицы на смартфонах */
        .table-container {
            width: 100%;
            max-width: 900px;
            margin: 20px auto;
            overflow-x: auto; /* Включает прокрутку, если таблица не влазит */
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            -webkit-overflow-scrolling: touch;
        }

        .rating-table {
            width: 100%;
            border-collapse: collapse;
            background-color: #161b22;
            min-width: 400px; /* Чтобы таблица не сжималась в кашу на крошечных экранах */
        }

        .rating-table th, .rating-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #30363d;
        }

        .rating-table th {
            background-color: #21262d;
            color: #58a6ff;
            font-size: 12px;
            text-transform: uppercase;
        }

        .rating-table td.center, .rating-table th.center {
            text-align: center;
            width: 60px;
        }

        .team-col {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .team-logo-small {
            width: 35px;
            height: 35px;
            border-radius: 8px;
            object-fit: cover;
            background-color: #21262d;
            transition: transform 0.2s ease;
        }

        /* Анимации при наведении */
        .rating-table tr {
            transition: background-color 0.2s ease;
        }

        .rating-table tbody tr:hover {
            background-color: #1f242c;
            cursor: pointer;
        }
        
        .rating-table tbody tr:hover .team-logo-small {
            transform: scale(1.1);
        }

        /* Всплывающий блок состава */
        .roster-box {
            display: none;
            background-color: #161b22;
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
            border-left: 5px solid #58a6ff;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            box-sizing: border-box;
            animation: fadeIn 0.4s ease forwards; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .roster-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .team-logo-big {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            object-fit: cover;
            background-color: #21262d;
        }

        .team-title {
            margin: 0;
            color: #58a6ff;
            font-size: 20px;
        }

        /* АДАПТИВНАЯ СЕТКА ИГРОКОВ: minmax делает магию переноса */
        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }

        .player-card {
            background-color: #21262d;
            padding: 15px 10px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #30363d;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .player-card:hover {
            transform: translateY(-4px);
            border-color: #58a6ff;
        }

        .player-avatar {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
            border: 2px solid #30363d;
            background-color: #0d1117;
        }

        .player-nick {
            font-weight: bold;
            color: #f0f6fc;
            font-size: 14px;
        }

        /* НАСТРОЙКИ ДЛЯ СОВСЕМ МАЛЕНЬКИХ ЭКРАНОВ (МОБИЛКИ) */
        @media (max-width: 480px) {
            h1 { font-size: 20px; }
            .roster-box { padding: 15px; }
            .player-grid { grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); }
            .player-avatar { width: 55px; height: 55px; }
        }
    </style>
</head>
<body>

    <!-- Версия сайта -->
    <div class="site-version">v0.0.4</div>

    <h1>Brawl Stars Rating</h1>
    <p class="subtitle">Киберспортивный топ команд (нажми для просмотра состава)</p>

    <!-- Обернули таблицу в контейнер table-container для адаптивности -->
    <div class="table-container">
        <table class="rating-table">
            <thead>
                <tr>
                    <th class="center">Место</th>
                    <th>Команда</th>
                    <th class="center">Статус</th>
                </tr>
            </thead>
            <tbody>
                <tr onclick="showRoster('FUT')">
                    <td class="center" style="font-weight: bold; color: #ff9f0a;">#1</td>
                    <td>
                        <div class="team-col">
                            <img id="list-logo-FUT" src="" class="team-logo-small" alt="FUT">
                            <span style="font-weight: bold; color: #ff9f0a;">FUT Esports</span>
                        </div>
                    </td>
                    <td class="center" style="color: #8b949e;">Топ-1</td>
                </tr>
                <tr onclick="showRoster('HMBLE')">
                    <td class="center" style="font-weight: bold;">#2</td>
                    <td>
                        <div class="team-col">
                            <img id="list-logo-HMBLE" src="" class="team-logo-small" alt="HMBLE">
                            <span>HMBLE</span>
                        </div>
                    </td>
                    <td class="center" style="color: #8b949e;">Топ-2</td>
                </tr>
                <tr onclick="showRoster('ZETA')">
                    <td class="center" style="font-weight: bold;">#3</td>
                    <td>
                        <div class="team-col">
                            <img id="list-logo-ZETA" src="" class="team-logo-small" alt="ZETA">
                            <span>ZETA DIVISION</span>
                        </div>
                    </td>
                    <td class="center" style="color: #8b949e;">Топ-3</td>
                </tr>
                <tr onclick="showRoster('NAVI')">
                    <td class="center" style="font-weight: bold;">#4</td>
                    <td>
                        <div class="team-col">
                            <img id="list-logo-NAVI" src="" class="team-logo-small" alt="NAVI">
                            <span>Natus Vincere</span>
                        </div>
                    </td>
                    <td class="center" style="color: #8b949e;">Топ-4</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Всплывающий блок состава -->
    <div id="roster" class="roster-box">
        <div class="roster-header">
            <img id="team-logo-big" src="" class="team-logo-big" alt="Лого">
            <h3 id="team-name" class="team-title"></h3>
        </div>
        <p style="margin-bottom: 15px;"><strong>Текущий состав:</strong></p>
        <div id="player-grid" class="player-grid"></div>
    </div>

    <script>
        const teamData = {
            'FUT': {
                name: 'FUT Esports',
                logo: 'fut-logo.png', 
                players: [
                    { nick: 'AngerBoy', avatar: 'angelboy.png' },
                    { nick: 'Guesti', avatar: 'guesti.png' },
                    { nick: 'Nob', avatar: 'nob.png' }
                ]
            },
            'HMBLE': {
                name: 'HMBLE',
                logo: 'HMBLE-icon.png',
                players: [
                    { nick: 'BosS', avatar: 'boss-icon.png' },
                    { nick: 'Lukii', avatar: 'lukii.png' },
                    { nick: 'Symantec', avatar: 'symantec.png' }
                ]
            },
            'ZETA': {
                name: 'ZETA DIVISION',
                logo: 'zeta-logo.png',
                players: [
                    { nick: 'Battoman', avatar: 'battoman.png' },
                    { nick: 'Sitetampo', avatar: 'stetampo.png' },
                    { nick: 'Sizuku', avatar: '1200px-ZETA_Sizuku_at_WF25.png' }
                ]
            },
            'NAVI': {
                name: 'Natus Vincere (NAVI)',
                logo: 'NAvi-logo.png',
                players: [
                    { nick: 'Drage', avatar: 'drage.jpg' },
                    { nick: 'Enraged', avatar: 'enraged.png' },
                    { nick: 'GeRo', avatar: 'gero.png' }
                ]
            }
        };

        window.onload = function() {
            for (let key in teamData) {
                let imgElement = document.getElementById('list-logo-' + key);
                if (imgElement && teamData[key].logo !== 'ВСТАВЬ_ССЫЛКУ_СЮДА') {
                    imgElement.src = teamData[key].logo;
                }
            }
        };

        function showRoster(teamKey) {
            const data = teamData[teamKey];
            
            const rosterBox = document.getElementById('roster');
            rosterBox.style.display = 'none';
            void rosterBox.offsetWidth; 
            rosterBox.style.display = 'block';
            
            document.getElementById('team-name').innerText = data.name;
            
            const bigLogo = document.getElementById('team-logo-big');
            if (data.logo !== 'ВСТАВЬ_ССЫЛКУ_СЮДА') {
                bigLogo.src = data.logo;
                bigLogo.style.display = 'block';
            } else {
                bigLogo.style.display = 'none';
            }

            const grid = document.getElementById('player-grid');
            grid.innerHTML = '';

            data.players.forEach(player => {
                const card = document.createElement('div');
                card.className = 'player-card';
                
                let imgSrc = player.avatar !== 'ВСТАВЬ_ССЫЛКУ_СЮДА' ? player.avatar : '';
                
                card.innerHTML = `
                    <img src="${imgSrc}" class="player-avatar" alt="">
                    <div class="player-nick">${player.nick}</div>
                `;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
